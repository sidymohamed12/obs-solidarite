@if (loading) {
  <section class="max-w-5xl mx-auto px-4 sm:px-6 py-10">
    <div class="rounded-4xl border border-slate-100 bg-white px-6 py-10 text-center text-slate-500">
      Chargement des programmes...
    </div>
  </section>
} @else {
  <app-demande-form
    title="Déposer une demande d'aide"
    subtitle="Renseignez votre identité, précisez votre besoin puis ajoutez vos justificatifs avant l'envoi du dossier."
    submitLabel="Finaliser ma demande"
    [programmes]="programmes"
    [submitting]="submitting"
    [errorMessage]="errorMessage"
    (formSubmitted)="submit($event)"
  ></app-demande-form>
}
