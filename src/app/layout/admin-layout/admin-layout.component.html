<div class="min-h-screen bg-[radial-gradient(circle_at_top,rgba(16,185,129,0.16),transparent_28%),linear-gradient(180deg,#f8fafc_0%,#eef2f7_100%)] text-slate-900">
	<nav class="sticky top-0 z-50 w-full border-b border-slate-100 bg-white/90 backdrop-blur-md">
		<div class="max-w-640 mx-auto px-4 sm:px-8 lg:px-16 flex justify-between items-center h-20 gap-4">
			<a [routerLink]="isAdmin() ? '/admin/demandes' : '/admin/agent/demandes'" class="flex items-center gap-3">
				<div class="w-14 h-14 bg-white rounded-lg flex items-center justify-center shadow-sm border border-slate-100">
					<img class="w-full h-full object-cover" src="logo.png" alt="Logo" />
				</div>
				<div class="hidden sm:block">
					<h1 class="font-bold text-sm flex flex-col text-primary uppercase tracking-wider leading-tight">
						TAXAWU
						<span class="text-slate-600 text-[8px]">{{ brandSubtitle() }} <br />Observatoire des Solidarités</span>
					</h1>
				</div>
			</a>

			<div class="hidden md:flex items-center gap-2 rounded-full border border-slate-200 bg-slate-50 px-2 py-1">
				<a
					*ngFor="let item of navItems()"
					[routerLink]="item.link"
					routerLinkActive="bg-white text-emerald-700 shadow-sm"
					[routerLinkActiveOptions]="{ exact: true }"
					class="rounded-full px-4 py-2 text-xs font-black uppercase tracking-[0.16em] text-slate-500 transition hover:text-emerald-700"
				>
					{{ item.label }}
				</a>
			</div>

			<div class="relative" (click)="$event.stopPropagation()">
				<button
					type="button"
					(click)="toggleProfileMenu()"
					class="inline-flex items-center gap-3 rounded-full border border-slate-200 bg-white px-3 py-2 text-left shadow-sm transition hover:border-emerald-200 hover:bg-emerald-50/60"
				>
					<span class="flex h-11 w-11 items-center justify-center rounded-full bg-slate-950 text-sm font-black tracking-[0.12em] text-white">
						{{ currentUserInitials() }}
					</span>
					<span class="hidden sm:block">
						<span class="block text-sm font-bold text-slate-900">{{ currentUserName() }}</span>
						<span class="block text-xs uppercase tracking-[0.18em] text-slate-400">{{ currentUserRole() }}</span>
					</span>
					<i class="fa-solid fa-chevron-down text-xs text-slate-400 transition" [class.rotate-180]="profileMenuOpen()"></i>
				</button>

				<div
					*ngIf="profileMenuOpen()"
					class="absolute right-0 mt-3 w-72 overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-2xl shadow-slate-900/10"
				>
					<div class="border-b border-slate-100 px-5 py-4">
						<p class="text-xs font-black uppercase tracking-[0.22em] text-slate-400">Session</p>
						<p class="mt-2 text-base font-black text-slate-950">{{ currentUserName() }}</p>
						<p class="mt-1 text-sm text-slate-500">{{ currentUser()?.email || 'Email indisponible' }}</p>
					</div>

					<div class="px-3 py-3">
						<div class="rounded-2xl bg-slate-50 px-4 py-3 text-sm text-slate-600">
							<p><span class="font-semibold text-slate-900">Rôle :</span> {{ currentUserRole() }}</p>
							<p class="mt-1"><span class="font-semibold text-slate-900">Téléphone :</span> {{ currentUser()?.phoneNumber || '-' }}</p>
						</div>

						<button
							type="button"
							(click)="logout()"
							class="mt-3 flex w-full items-center justify-between rounded-2xl border border-rose-200 px-4 py-3 text-sm font-semibold text-rose-700 transition hover:bg-rose-50"
						>
							<span>Déconnexion</span>
							<i class="fa-solid fa-right-from-bracket"></i>
						</button>
					</div>
				</div>
			</div>
		</div>
	</nav>

	<main class="min-w-0">
		<router-outlet></router-outlet>
	</main>
</div>
